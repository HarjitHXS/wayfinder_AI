version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - GOOGLE_CLOUD_PROJECT_ID=${GOOGLE_CLOUD_PROJECT_ID:-autosteer-demo}
      - GOOGLE_CLOUD_REGION=us-central1
      - GEMINI_MODEL=gemini-2.0-flash
      - BACKEND_PORT=3001
      - FRONTEND_URL=http://localhost:3000
      - FIREBASE_SERVICE_ACCOUNT=${FIREBASE_SERVICE_ACCOUNT}
    volumes:
      - ./backend:/app
    depends_on:
      - frontend
    networks:
      - autosteer

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    networks:
      - autosteer

networks:
  autosteer:
    driver: bridge
