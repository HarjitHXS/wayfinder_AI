<div class="suggestions-panel" *ngIf="suggestions && suggestions.length > 0">
  <div class="suggestions-container">
    <div class="suggestions-header">
      <h4 class="suggestions-title">💫 What's Next?</h4>
      <p class="suggestions-subtitle">Agent suggestions based on task completion</p>
    </div>

    <div class="suggestions-list">
      <button
        *ngFor="let suggestion of suggestions; let i = index"
        type="button"
        class="suggestion-card"
        (click)="onSuggestionClick(suggestion)"
        title="Click to try this suggestion">
        <div class="suggestion-icon">{{ getSuggestionIcon(suggestion.actionType) }}</div>
        <div class="suggestion-content">
          <div class="suggestion-text">{{ suggestion.text }}</div>
          <div *ngIf="suggestion.description" class="suggestion-description">
            {{ suggestion.description }}
          </div>
          <div *ngIf="isValidSelector(suggestion.target)" class="suggestion-target">
            <code>{{ suggestion.target }}</code>
          </div>
        </div>
        <div class="suggestion-action">
          <span class="action-arrow">→</span>
        </div>
      </button>
    </div>

    <div class="suggestions-footer">
      <p class="suggestions-hint">👆 Click a suggestion to execute it as your next task</p>
    </div>
  </div>
</div>
