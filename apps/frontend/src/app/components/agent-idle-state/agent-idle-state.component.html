<div class="agent-idle">
  <div class="wayfinder-avatar">
    <div class="avatar-glow"></div>
    <div class="avatar-circle">
      <svg class="agent-brain" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Neural network pattern -->
        <circle cx="6" cy="6" r="2" fill="currentColor" opacity="0.8"/>
        <circle cx="18" cy="6" r="2" fill="currentColor" opacity="0.8"/>
        <circle cx="6" cy="18" r="2" fill="currentColor" opacity="0.8"/>
        <circle cx="18" cy="18" r="2" fill="currentColor" opacity="0.8"/>
        <circle cx="12" cy="12" r="3" fill="currentColor"/>
        
        <!-- Connecting lines -->
        <path d="M8 6L10 12M16 6L14 12M8 18L10 12M16 18L14 12" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
        <path d="M6 8L12 10M18 8L12 10M6 16L12 14M18 16L12 14" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
        
        <!-- Outer ring -->
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      </svg>
      <div class="pulse-ring"></div>
      <div class="thinking-indicator">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
  
  <div class="agent-identity">
    <h1 class="agent-name">Wayfinder AI</h1>
    <div class="agent-tagline">Your Intelligent Web Navigation Assistant</div>
  </div>
  
  <div class="greeting-container">
    <div class="greeting-text">
      <span class="typed-text">{{ displayText }}</span>
      <span class="cursor" [class.blink]="showCursor">|</span>
    </div>
  </div>

  <div class="capabilities-grid">
    <div class="capability-card" *ngFor="let capability of capabilities; let i = index" 
         [style.animation-delay]="(i * 0.2) + 's'">
      <div class="capability-icon">{{ capability.icon }}</div>
      <div class="capability-title">{{ capability.title }}</div>
      <div class="capability-desc">{{ capability.description }}</div>
    </div>
  </div>

  <div class="interaction-prompt">
    <div class="prompt-text">Ready to explore? Start a conversation below</div>
    <div class="prompt-arrow">↓</div>
  </div>

  <div class="floating-particles">
    <div class="particle" *ngFor="let i of [1,2,3,4,5,6,7,8]"></div>
  </div>
</div>
