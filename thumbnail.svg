<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#283593;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949ab;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e676;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c853;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern background (subtle) -->
  <g opacity="0.1">
    <path d="M 0 100 L 1200 100 M 0 200 L 1200 200 M 0 300 L 1200 300 M 0 400 L 1200 400 M 0 500 L 1200 500 M 0 600 L 1200 600 M 0 700 L 1200 700" stroke="#ffffff" stroke-width="1"/>
    <path d="M 100 0 L 100 800 M 200 0 L 200 800 M 300 0 L 300 800 M 400 0 L 400 800 M 500 0 L 500 800 M 600 0 L 600 800 M 700 0 L 700 800 M 800 0 L 800 800 M 900 0 L 900 800 M 1000 0 L 1000 800 M 1100 0 L 1100 800" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Browser window mockup -->
  <g transform="translate(700, 200)">
    <!-- Window -->
    <rect x="0" y="0" width="420" height="320" rx="12" fill="#ffffff" opacity="0.95"/>
    
    <!-- Browser chrome -->
    <rect x="0" y="0" width="420" height="40" rx="12" fill="#e0e0e0"/>
    <rect x="0" y="40" width="420" height="280" fill="#ffffff"/>
    
    <!-- Browser dots -->
    <circle cx="20" cy="20" r="6" fill="#ff5252"/>
    <circle cx="40" cy="20" r="6" fill="#ffc107"/>
    <circle cx="60" cy="20" r="6" fill="#00e676"/>
    
    <!-- Address bar -->
    <rect x="90" y="12" width="270" height="16" rx="8" fill="#f5f5f5"/>
    <text x="100" y="23" font-family="Arial, sans-serif" font-size="10" fill="#9e9e9e">https://example.com</text>
    
    <!-- Page content simulation -->
    <rect x="20" y="60" width="100" height="12" rx="4" fill="#e0e0e0"/>
    <rect x="20" y="85" width="380" height="6" rx="3" fill="#f5f5f5"/>
    <rect x="20" y="100" width="350" height="6" rx="3" fill="#f5f5f5"/>
    <rect x="20" y="115" width="320" height="6" rx="3" fill="#f5f5f5"/>
    
    <!-- Button elements -->
    <rect x="20" y="140" width="80" height="28" rx="6" fill="#4285f4"/>
    <rect x="110" y="140" width="80" height="28" rx="6" fill="#e0e0e0"/>
    
    <!-- AI vision "scanning" effect -->
    <rect x="15" y="130" width="390" height="50" rx="8" fill="none" stroke="#00e676" stroke-width="3" opacity="0.7" stroke-dasharray="10,5">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Eye/Vision icon (representing Gemini vision) -->
  <g transform="translate(100, 250)">
    <circle cx="150" cy="150" r="120" fill="url(#accentGradient)" opacity="0.2"/>
    <circle cx="150" cy="150" r="100" fill="none" stroke="url(#accentGradient)" stroke-width="4" filter="url(#glow)"/>
    
    <!-- Eye shape -->
    <ellipse cx="150" cy="150" rx="80" ry="50" fill="none" stroke="#ffffff" stroke-width="4"/>
    <circle cx="150" cy="150" r="30" fill="#ffffff"/>
    <circle cx="150" cy="150" r="20" fill="#00e676"/>
    <circle cx="142" cy="142" r="8" fill="#ffffff" opacity="0.8"/>
    
    <!-- Scan lines -->
    <line x1="90" y1="150" x2="210" y2="150" stroke="#00e676" stroke-width="2" opacity="0.6">
      <animate attributeName="y1" values="130;170;130" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="130;170;130" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Connecting line/path -->
  <path d="M 320 400 Q 500 400, 700 350" fill="none" stroke="url(#accentGradient)" stroke-width="3" stroke-dasharray="10,5" opacity="0.7">
    <animate attributeName="stroke-dashoffset" from="0" to="30" dur="1.5s" repeatCount="indefinite"/>
  </path>
  
  <!-- Click/interaction indicators -->
  <g transform="translate(850, 330)" opacity="0.8">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#00e676" stroke-width="2">
      <animate attributeName="r" values="10;20;10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="5" fill="#00e676"/>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="650" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" filter="url(#glow)">
    Wayfinder AI
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="700" font-family="'Segoe UI', Arial, sans-serif" font-size="32" fill="#00e676" text-anchor="middle">
    Visual Web Navigator
  </text>
  
  <!-- Tagline -->
  <text x="600" y="740" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" opacity="0.9">
    Powered by Gemini Vision • Autonomous UI Understanding
  </text>
  
  <!-- Google Cloud logo text -->
  <g transform="translate(50, 720)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.7">
      Built on Google Cloud
    </text>
  </g>
  
  <!-- Decorative particles -->
  <g opacity="0.6">
    <circle cx="950" cy="150" r="4" fill="#00e676">
      <animate attributeName="cy" values="140;160;140" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="200" r="3" fill="#00e676">
      <animate attributeName="cy" values="190;210;190" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="600" r="5" fill="#00e676">
      <animate attributeName="cx" values="140;160;140" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
